<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>AMap Embed</title>
  <style>
    html,body,#map { width:100%; height:100%; margin:0; padding:0; }
  </style>
  <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY"></script>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = new AMap.Map('map', {
      zoom: 12,
      center: [113.3245, 23.0999],
    });
    let markers = [];

    function clearMarkers() {
      if (markers.length) {
        map.remove(markers);
        markers = [];
      }
    }

    function renderPoints(list) {
      clearMarkers();
      list.forEach(pt => {
        const marker = new AMap.Marker({
          position: pt.position,
          title: pt.name,
        });
        marker.on('click', () => {
          if (window.parent) {
            window.parent.postMessage({ type: 'POINT_CLICK', payload: { layerType: pt.layerType, id: pt.id } }, '*');
          }
        });
        markers.push(marker);
      });
      map.add(markers);
      if (markers.length) {
        map.setFitView(markers);
      }
    }

    window.addEventListener('message', (event) => {
      const data = event.data;
      if (!data) return;
      if (data.type === 'POINTS') {
        renderPoints(data.payload || []);
      }
    });
  </script>
</body>
</html>
