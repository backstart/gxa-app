<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Lab Blank</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(84, 145, 255, 0.2), transparent 28%),
        linear-gradient(180deg, #eef4f8 0%, #dbe6ef 100%);
      color: #203243;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 32px rgba(17, 39, 57, 0.12);
      text-align: center;
    }

    .title {
      display: block;
      font-size: 18px;
      font-weight: 700;
    }

    .desc {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.6;
      color: #607588;
    }
  </style>
</head>
<body>
  <div class="panel">
    <span class="title">Map Lab Blank</span>
    <span class="desc">这是最轻量的本地空白页，用来验证 web-view 基础承载是否稳定。</span>
  </div>
</body>
</html>
